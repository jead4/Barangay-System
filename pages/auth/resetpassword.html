<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reset Password — Barangay Day-as</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .reset-card {
      background: #0f1f2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.75rem;
      width: 100%;
      max-width: 440px;
    }
    .reset-header { text-align: center; margin-bottom: 2rem; }
    .reset-logo {
      width: 60px; height: 60px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 1rem;
      border: 2px solid rgba(42,157,107,0.35);
      display: block;
    }
    .reset-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem; font-weight: 800;
      color: var(--white); margin-bottom: 0.3rem;
    }
    .reset-header p { color: rgba(255,255,255,0.45); font-size: 0.875rem; }

    .reset-form { display: flex; flex-direction: column; gap: 1rem; }
    .reset-input-group { display: flex; flex-direction: column; gap: 6px; }
    .reset-input-group label {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.5);
    }
    .reset-input-group input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 14px;
      color: var(--white); font-family: 'Inter',sans-serif;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    .reset-input-group input:focus { border-color: var(--gold); }
    .reset-input-group input::placeholder { color: rgba(255,255,255,0.22); }

    .reset-error { font-size: 0.82rem; color: #f87171; min-height: 1rem; }
    .reset-success {
      text-align: center; padding: 1.5rem 0;
      display: none;
    }
    .reset-success .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .reset-success h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--white); margin-bottom: 0.5rem;
    }
    .reset-success p { color: rgba(255,255,255,0.55); font-size: 0.9rem; line-height: 1.7; }

    .btn-reset {
      background: linear-gradient(135deg, var(--gold), #1f7a51);
      color: var(--white); border: none; border-radius: 10px;
      padding: 14px; font-family: 'Inter',sans-serif;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 0.25rem;
    }
    .btn-reset:hover { transform: translateY(-1px); box-shadow: 0 10px 25px rgba(42,157,107,0.35); }
    .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .back-link {
      text-align: center; font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }
    .back-link a { color: var(--gold-light); text-decoration: none; font-weight: 600; }

    .password-strength {
      height: 4px; border-radius: 100px;
      background: #e2e8f0; overflow: hidden; margin-top: 6px;
    }
    .strength-fill {
      height: 100%; border-radius: 100px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      font-size: 0.72rem; color: rgba(255,255,255,0.4);
      margin-top: 4px; display: block;
    }
  </style>
</head>
<body>

  <div class="reset-card">

    <div class="reset-header">
      <img src="/assets/images/logo.png" alt="Logo" class="reset-logo">
      <h2>Set New Password</h2>
      <p>Enter your new password below</p>
    </div>

    <!-- Success state -->
    <div class="reset-success" id="reset-success">
      <div class="success-icon">✅</div>
      <h3>Password Updated!</h3>
      <p>Your password has been successfully changed. Redirecting you to login...</p>
    </div>

    <!-- Form -->
    <form class="reset-form" id="reset-form">

      <div class="reset-input-group">
        <label>NEW PASSWORD</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
        <div class="password-strength">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
      </div>

      <div class="reset-input-group">
        <label>CONFIRM NEW PASSWORD</label>
        <input type="password" id="confirm-password" placeholder="Re-enter new password" required>
      </div>

      <div class="reset-error" id="reset-error"></div>

      <button type="submit" class="btn-reset" id="reset-btn">Update Password</button>

      <p class="back-link">
        <a href="/index.html">← Back to Home</a>
      </p>

    </form>

  </div>

  <script type="module">
    import { supabase } from '/js/supabase.js'

    // ── PASSWORD STRENGTH ──
    window.checkStrength = (val) => {
      const fill  = document.getElementById('strength-fill')
      const label = document.getElementById('strength-label')
      let strength = 0
      if (val.length >= 8)             strength++
      if (/[A-Z]/.test(val))           strength++
      if (/[0-9]/.test(val))           strength++
      if (/[^A-Za-z0-9]/.test(val))   strength++

      const colors = ['', '#dc2626', '#f97316', '#eab308', '#2a9d6b']
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong']
      const widths  = ['0%', '25%', '50%', '75%', '100%']

      fill.style.width      = widths[strength]
      fill.style.background = colors[strength]
      label.textContent     = val.length ? labels[strength] : ''
      label.style.color     = colors[strength]
    }

    // ── HANDLE RESET ──
    const form = document.getElementById('reset-form')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const newPass     = document.getElementById('new-password').value
      const confirmPass = document.getElementById('confirm-password').value
      const errorEl     = document.getElementById('reset-error')
      const btn         = document.getElementById('reset-btn')

      errorEl.textContent = ''

      if (newPass !== confirmPass) {
        errorEl.textContent = 'Passwords do not match.'
        return
      }
      if (newPass.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.'
        return
      }

      btn.disabled    = true
      btn.textContent = 'Updating...'

      const { error } = await supabase.auth.updateUser({ password: newPass })

      if (error) {
        errorEl.textContent = error.message || 'Failed to update password. Please try again.'
        btn.disabled    = false
        btn.textContent = 'Update Password'
        return
      }

      // Show success
      form.style.display = 'none'
      document.getElementById('reset-success').style.display = 'block'

      // Redirect to home after 2.5 seconds
      setTimeout(() => { window.location.href = '/index.html' }, 2500)
    })
  </script>

</body>
</html>
